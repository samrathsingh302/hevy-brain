target-version = "py312"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401",  # Dynamically typed expressions (typing.Any) are disallowed
    "D203",    # no-blank-line-before-class (incompatible with formatter)
    "D212",    # multi-line-summary-first-line (incompatible with formatter)
    "D213",    # multi-line-summary-second-line (we use first-line summaries)
    "COM812",  # incompatible with formatter
    "ISC001",  # incompatible with formatter
    "D104",    # Missing docstring in public package
    "PLR2004", # Magic value used in comparison
    "TID252",  # relative imports are idiomatic inside this package
    "TC001",   # typing-only import blocks add noise
    "TC002",
    "TC003",
    "PERF401", # explicit loops are often clearer than comprehensions
    "PLC0415", # lazy imports are intentional (optional deps, CLI startup)
    "PLR0913", # renderers legitimately take several data inputs
    "RUF001",  # × and · are intentional in markdown output
]

[lint.per-file-ignores]
"hevy_brain/cli.py" = [
    "T201",    # a CLI prints
    "PLR0911", # command dispatch has one return per command
]
"scripts/**" = ["ALL"]
"tests/**" = [
    "S101",    # assert is fine in tests
    "ANN",     # don't require full type annotations on test funcs/fixtures
    "D",       # docstrings optional in tests
    "SLF001",  # private member access is the whole point of unit tests
    "PLR2004", # magic numbers are fine in assertions
    "INP001",  # tests dir is not an implicit namespace package
    "FBT001",  # boolean args in fixtures
    "ARG001",  # fake clients ignore some arguments by design
    "ARG002",
    "EM101",   # literal exception messages are fine in test fakes
    "PLC0415",
    "PLR0913", # test helper builders may take many fields by design
    "E501",    # long fixture strings
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
