---
name: "Bug report"
description: "Report a bug in hevy-brain"
body:
  - type: textarea
    attributes:
      label: "Describe the bug"
      description: "What happened, and what did you expect instead?"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Reproduction steps"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Environment"
      description: "OS, Python version (`python --version`), and how you installed hevy-brain."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "CLI output / logs"
      description: "Relevant command output or lines from `logs/`. Redact your API key if it appears."
      render: text
