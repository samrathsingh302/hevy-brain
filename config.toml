# hevy-brain configuration.
# Secrets are NEVER read from this file - set HEVY_API_KEY and
# ANTHROPIC_API_KEY as environment variables.

[vault]
# Real Obsidian vault (the .obsidian folder lives here). hevy-brain only
# ever writes inside the `subfolder` below - a separate folder that does not
# touch your existing notes.
path = 'C:\Users\samra\Atlas'
subfolder = "Hevy"

[sync]
data_dir = "data"
page_size = 10  # Hevy API hard cap

[coach]
model = "claude-opus-4-8"
max_calls_per_day = 4

[analytics]
plateau_weeks = 4
push_pull_low = 0.8
push_pull_high = 1.25
review_weeks = 4
review_months = 2

# Optional manual muscle-group overrides (substring -> group), e.g.:
# [analytics.muscle_overrides]
# "farmer" = "core"
