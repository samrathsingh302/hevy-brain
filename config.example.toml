# hevy-brain configuration — copy this file to `config.toml` and edit.
# Without a config.toml, hevy-brain writes to a local `vault_staging/` folder
# (safe default for trying it out).
# Secrets are NEVER read from this file - set HEVY_API_KEY and
# ANTHROPIC_API_KEY as environment variables.

[vault]
# Your Obsidian vault root (the folder containing `.obsidian`). hevy-brain
# only ever writes inside the `subfolder` below - a separate folder that does
# not touch your existing notes.
path = 'C:\path\to\your\vault'
subfolder = "Hevy"

[sync]
data_dir = "data"
page_size = 10  # Hevy API hard cap

[coach]
model = "claude-opus-4-8"
max_calls_per_day = 4

[knowledge]
# Read-only bridge to the atlas-pipeline knowledge layer (topics/, notes/,
# _meta/). Coach briefings ground advice in these cited claims and label every
# training-science point `cited` (with link) or `general-knowledge`.
# `path` defaults to the vault root above if omitted; never written, and
# `sources/` is never read.
# path = 'C:\path\to\your\vault'
topics = ["training"]  # topic pages to pull cited claims from for coaching

[guide]
# `hevy-brain guide return` — comeback protocol after a training lapse.
lapse_days = 14       # minimum gap (days) before a lapse is declared
load_fraction = 0.6   # Return Week 1 loads as a fraction of pre-lapse
                      # (a general-knowledge default, not a cited claim)
draft_limit = 3       # how many routine drafts to write (return + redesign)
baseline_weeks = 4    # pre-lapse window the baselines are computed over
# `hevy-brain guide redesign` — programme-change briefing + editable drafts.
redesign_weeks = 8    # window (ending at the last workout) the snapshot covers

[charts]
# Progress charts in notes, rendered as Mermaid xychart-beta (zero deps —
# Obsidian renders them natively). Set enabled = false to omit all charts.
enabled = true
volume_weeks = 12  # weeks of weekly-volume trend on the Dashboard
e1rm_points = 10   # most-recent loaded sessions in each exercise's e1RM trend
# GitHub-style training heatmap on the Dashboard (working-set count per day;
# untrained days read as blank, so a lapse shows honestly).
heatmap_enabled = true
heatmap_weeks = 26  # weeks of history the heatmap covers

[progression]
# `Next session target` tip on each exercise note — double progression off the
# most recent session's best set (general-knowledge default, not a cited claim).
# Bodyweight-only lifts are skipped (no load to progress).
enabled = true
rep_low = 8          # bottom of the working rep range
rep_high = 12        # top of the rep range; clear it on all sets -> add load
increment_kg = 2.5   # load added once the top of the range is cleared
min_sessions = 3     # loaded sessions required before a target is suggested

[analytics]
plateau_weeks = 4
push_pull_low = 0.8
push_pull_high = 1.25
review_weeks = 4
review_months = 2
lapse_nudge_days = 7  # quiet days before the Dashboard shows a nudge (0 = off);
                      # escalates to a `guide return` prompt at guide.lapse_days
# Deload-readiness callout on the Dashboard — fires only on deterministic
# thresholds (consecutive trained weeks + recent training + plateau/high RPE);
# a general training-science heuristic, not personalised or medical advice.
deload_weeks = 6      # consecutive trained weeks before deload is considered
deload_rpe = 8.5      # recent mean working-set RPE that counts as "high"

# Optional manual muscle-group overrides (substring -> group), e.g.:
# [analytics.muscle_overrides]
# "farmer" = "core"

[landmarks]
# Volume-landmark / MEV check — a Dashboard table comparing recent weekly
# working-sets-per-muscle-group against your MEV/MAV/MRV bands (sets/muscle/
# week). General published ranges, not cited or authoritative — yours to edit.
weeks = 4  # window (ending at the last workout) the weekly rate is computed over
# Per-group bands; any group you omit keeps the published default below.
# [landmarks.bands.chest]
# mev = 8.0
# mav = 14.0
# mrv = 22.0
