# hevy-brain configuration — copy this file to `config.toml` and edit.
# Without a config.toml, hevy-brain writes to a local `vault_staging/` folder
# (safe default for trying it out).
# Secrets are NEVER read from this file - set HEVY_API_KEY and
# ANTHROPIC_API_KEY as environment variables.

[vault]
# Your Obsidian vault root (the folder containing `.obsidian`). hevy-brain
# only ever writes inside the `subfolder` below - a separate folder that does
# not touch your existing notes.
path = 'C:\path\to\your\vault'
subfolder = "Hevy"

[sync]
data_dir = "data"
page_size = 10  # Hevy API hard cap

[coach]
model = "claude-opus-4-8"
max_calls_per_day = 4

[knowledge]
# Read-only bridge to the atlas-pipeline knowledge layer (topics/, notes/,
# _meta/). Coach briefings ground advice in these cited claims and label every
# training-science point `cited` (with link) or `general-knowledge`.
# `path` defaults to the vault root above if omitted; never written, and
# `sources/` is never read.
# path = 'C:\path\to\your\vault'
topics = ["training"]  # topic pages to pull cited claims from for coaching

[guide]
# `hevy-brain guide return` — comeback protocol after a training lapse.
lapse_days = 14       # minimum gap (days) before a lapse is declared
load_fraction = 0.6   # Return Week 1 loads as a fraction of pre-lapse
                      # (a general-knowledge default, not a cited claim)
draft_limit = 3       # how many Return Week 1 routine drafts to write
baseline_weeks = 4    # pre-lapse window the baselines are computed over

[analytics]
plateau_weeks = 4
push_pull_low = 0.8
push_pull_high = 1.25
review_weeks = 4
review_months = 2

# Optional manual muscle-group overrides (substring -> group), e.g.:
# [analytics.muscle_overrides]
# "farmer" = "core"
